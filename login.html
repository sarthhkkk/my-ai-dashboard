<!DOCTYPE html><html lang="en" class="dark"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Sign In — My AI Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:#0a0a0f;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
/* Aurora background */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 80% 50% at 20% 30%,rgba(56,189,248,0.12) 0%,transparent 70%),
  radial-gradient(ellipse 60% 40% at 80% 20%,rgba(124,58,237,0.10) 0%,transparent 70%),
  radial-gradient(ellipse 70% 60% at 50% 80%,rgba(16,185,129,0.08) 0%,transparent 70%);
pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.015;pointer-events:none;z-index:0}
.login-wrap{position:relative;z-index:1;width:100%;max-width:380px;padding:20px}
.login-box{background:rgba(255,255,255,0.04);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:40px 32px 32px;text-align:center}
.login-box::before{content:'';position:absolute;inset:-1px;border-radius:21px;background:linear-gradient(135deg,rgba(56,189,248,0.3),rgba(124,58,237,0.3),rgba(16,185,129,0.3));z-index:-1;mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask-composite:exclude;-webkit-mask-composite:destination-out;padding:1px}
.login-icon{width:48px;height:48px;margin:0 auto 16px;border-radius:14px;background:linear-gradient(135deg,rgba(56,189,248,0.2),rgba(124,58,237,0.2));display:flex;align-items:center;justify-content:center;color:#38bdf8}
.login-title{color:#fff;font-size:22px;font-weight:600;margin-bottom:4px}
.login-sub{color:rgba(255,255,255,0.4);font-size:14px;margin-bottom:28px}
.login-form{display:flex;flex-direction:column;gap:14px}
.login-input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;font-size:15px;color:#fff;outline:none;transition:border-color .2s}
.login-input::placeholder{color:rgba(255,255,255,0.3)}
.login-input:focus{border-color:rgba(56,189,248,0.5)}
.login-btn{background:linear-gradient(135deg,#38bdf8,#6366f1);border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .2s;-webkit-tap-highlight-color:transparent}
.login-btn:active{opacity:.85}
.login-err{color:#f87171;font-size:13px;min-height:20px;margin-top:-4px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;white-space:nowrap}
</style>
</head><body>
<div class="login-wrap">
<div class="login-box">
<div class="login-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></div>
<h1 class="login-title">Dashboard</h1>
<p class="login-sub">Sign in to access</p>
<form class="login-form" id="loginForm" onsubmit="return false">
<label for="loginUser" class="sr-only">Username</label><input class="login-input" id="loginUser" type="text" placeholder="Username" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false">
<label for="loginPass" class="sr-only">Password</label><input class="login-input" id="loginPass" type="password" placeholder="Password" autocomplete="current-password">
<button class="login-btn" id="loginBtn" type="button">Sign In</button>
<p class="login-err" id="loginErr"></p>
</form>
</div></div>
<script>
var btn=document.getElementById('loginBtn'),errEl=document.getElementById('loginErr'),userEl=document.getElementById('loginUser'),passEl=document.getElementById('loginPass')
function doLogin(){
  var u=userEl.value.trim(),p=passEl.value
  if(!u||!p){errEl.textContent='Enter username and password';return}
  btn.textContent='Signing in...';errEl.textContent=''
  fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})})
  .then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.error||'Invalid credentials');return d})})
  .then(function(d){
    document.cookie='myd-token='+d.token+'; path=/; max-age=86400; SameSite=Lax'
    try{localStorage.setItem('myd-token',d.token)}catch(e){}
    window.location.href='/'
  })
  .catch(function(e){errEl.textContent=e.message;btn.textContent='Sign In'})
}
btn.addEventListener('click',doLogin)
userEl.addEventListener('keydown',function(e){if(e.key==='Enter')passEl.focus()})
passEl.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()})
userEl.focus()
</script>
</body></html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My AI Dashboard</title>
<style>
  :root {
    --bg: #212121;
    --sidebar: #171717;
    --surface: #2f2f2f;
    --hover: #3a3a3a;
    --active: #404040;
    --text: #ececec;
    --text-dim: #9e9e9e;
    --accent: #10a37f;
    --border: #333;
    --user-bg: #2f2f2f;
    --assistant-bg: #1e1e1e;
    --tool-bg: #1a2e2a;
    --code-bg: #111;
    --font: 'Segoe UI','SF Pro',system-ui,sans-serif;
    --radius: 8px;
    --sidebar-w: 300px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
  .sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    background: var(--sidebar); display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
  }
  .sidebar-header {
    padding: 16px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h1 { font-size: 16px; font-weight: 600; flex: 1; }
  .new-btn {
    background: var(--accent); color: #fff; border: none;
    padding: 6px 14px; border-radius: var(--radius); cursor: pointer;
    font-size: 13px; font-weight: 500; white-space: nowrap;
  }
  .new-btn:hover { opacity: 0.9; }
  .session-list { flex: 1; overflow-y: auto; padding: 8px; }
  .session-item {
    padding: 12px; border-radius: var(--radius); cursor: pointer;
    margin-bottom: 2px; transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .session-item:hover { background: var(--hover); }
  .session-item.active {
    background: var(--active); border-left-color: var(--accent);
  }
  .session-item .title {
    font-size: 13px; font-weight: 500; margin-bottom: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .session-item .meta {
    font-size: 11px; color: var(--text-dim);
    display: flex; gap: 8px;
  }
  .session-item .meta span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-footer {
    padding: 12px 16px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-dim);
    display: flex; justify-content: space-between;
  }
  .sidebar-footer .count { color: var(--accent); font-weight: 500; }
  .search-box {
    margin: 8px 12px; padding: 8px 12px;
    border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 13px;
    outline: none; width: calc(100% - 24px);
  }
  .search-box:focus { border-color: var(--accent); }
  .main {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  .main-header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; min-height: 60px;
  }
  .main-header h2 { font-size: 16px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .main-header .info {
    font-size: 12px; color: var(--text-dim); display: flex; gap: 16px;
  }
  .main-header .info span { white-space: nowrap; }
  .messages {
    flex: 1; overflow-y: auto; padding: 0;
  }
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; color: var(--text-dim);
    gap: 12px; padding: 40px;
  }
  .empty-state .icon { font-size: 48px; opacity: 0.3; }
  .empty-state p { font-size: 14px; text-align: center; max-width: 360px; }
  .msg { padding: 20px 24px; display: flex; gap: 16px; }
  .msg.user { background: var(--user-bg); }
  .msg.assistant { background: var(--assistant-bg); }
  .msg.tool { background: var(--tool-bg); }
  .msg.reasoning { background: transparent; opacity: 0.6; }
  .msg.reasoning .content { font-style: italic; font-size: 13px; }
  .msg .avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; margin-top: 2px;
  }
  .msg.user .avatar { background: #5436da; }
  .msg.assistant .avatar { background: var(--accent); }
  .msg.tool .avatar { background: #b8860b; font-size: 14px; }
  .msg .body { flex: 1; min-width: 0; }
  .msg .body .label {
    font-size: 12px; font-weight: 600; margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .msg .body .label .time { font-weight: 400; color: var(--text-dim); font-size: 11px; }
  .msg .content {
    font-size: 14px; line-height: 1.6; overflow-wrap: break-word; white-space: pre-wrap;
  }
  .msg .content code {
    background: var(--code-bg); padding: 2px 6px; border-radius: 4px;
    font-size: 13px; font-family: 'Cascadia Code','Fira Code','Consolas',monospace;
  }
  .msg .content pre {
    background: var(--code-bg); padding: 12px 16px; border-radius: var(--radius);
    overflow-x: auto; margin: 8px 0; font-size: 13px;
    font-family: 'Cascadia Code','Fira Code','Consolas',monospace;
    border: 1px solid var(--border);
  }
  .msg .content pre code { background: none; padding: 0; }
  .msg.tool .content {
    font-family: 'Cascadia Code','Fira Code','Consolas',monospace;
    font-size: 13px; background: rgba(0,0,0,0.2); padding: 10px 14px;
    border-radius: var(--radius); border-left: 3px solid #b8860b;
  }
  .loading { text-align: center; padding: 40px; color: var(--text-dim); }
  @media (max-width: 768px) {
    .sidebar { width: 100%; min-width: 0; display: none; }
    .sidebar.open { display: flex; position: fixed; left: 0; top: 0; bottom: 0; z-index: 10; }
    .sidebar-toggle { display: flex !important; }
  }
  .sidebar-toggle { display: none; background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 4px; }
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>My AI</h1>
    <button class="new-btn" onclick="runMyAI()">+ New</button>
  </div>
  <input class="search-box" id="search" placeholder="Search sessions..." oninput="filterSessions()">
  <div class="session-list" id="sessionList"></div>
  <div class="sidebar-footer">
    <span class="count" id="sessionCount">0</span>
    <span>sessions</span>
  </div>
</div>

<div class="main">
  <div class="main-header">
    <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">&#9776;</button>
    <h2 id="mainTitle">Select a session</h2>
    <div class="info" id="mainInfo"></div>
  </div>
  <div class="messages" id="messages">
    <div class="empty-state">
      <div class="icon">&#128172;</div>
      <p>Select a session from the sidebar to view the conversation, or start a new one.</p>
    </div>
  </div>
</div>

<script>
let sessions = [];
let currentSession = null;

async function fetchJSON(url) {
  const r = await fetch(url);
  return r.json();
}

function formatTime(epoch) {
  const d = new Date(Number(epoch));
  return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function timeAgo(epoch) {
  const diff = Date.now() - Number(epoch);
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function escapeHtml(text) {
  if (!text) return '';
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function renderContent(text) {
  if (!text) return '';
  let t = escapeHtml(text);
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\n/g, '<br>');
  return t;
}

function getAvatar(role) {
  if (role === 'user') return '&#128100;';
  if (role === 'tool') return '&#128295;';
  return '&#129302;';
}

function getLabel(role) {
  if (role === 'user') return 'You';
  if (role === 'tool') return 'Tool';
  return 'Assistant';
}

async function loadSessions() {
  sessions = await fetchJSON('/api/sessions');
  renderSessions(sessions);
  document.getElementById('sessionCount').textContent = sessions.length;
}

function renderSessions(list) {
  const el = document.getElementById('sessionList');
  el.innerHTML = list.map(function(s) {
    const active = currentSession && currentSession.id === s.id ? 'active' : '';
    const created = s.time_created ? timeAgo(s.time_created) : '';
    return '<div class="session-item ' + active + '" data-id="' + s.id + '" onclick="selectSession(\'' + s.id + '\')">' +
      '<div class="title">' + escapeHtml(s.title || 'Untitled') + '</div>' +
      '<div class="meta">' +
        '<span>' + created + '</span>' +
        (s.model ? '<span>' + escapeHtml(s.model) + '</span>' : '') +
      '</div></div>';
  }).join('');
}

function filterSessions() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = sessions.filter(function(s) {
    return (s.title || '').toLowerCase().includes(q);
  });
  renderSessions(filtered);
}

async function selectSession(id) {
  currentSession = { id: id };
  renderSessions(sessions);
  document.getElementById('messages').innerHTML = '<div class="loading">Loading...</div>';

  const [session, msgs] = await Promise.all([
    fetchJSON('/api/session/' + id),
    fetchJSON('/api/messages/' + id)
  ]);

  currentSession = session || { id: id };

  document.getElementById('mainTitle').textContent = session ? escapeHtml(session.title || 'Untitled') : 'Untitled';

  const infoEl = document.getElementById('mainInfo');
  if (session) {
    var parts = [];
    if (session.created_at) parts.push('<span>' + session.created_at + '</span>');
    if (session.model) parts.push('<span>' + escapeHtml(session.model) + '</span>');
    if (session.cost) parts.push('<span>$' + parseFloat(session.cost).toFixed(4) + '</span>');
    if (session.tokens_input) parts.push('<span>' + Number(session.tokens_input).toLocaleString() + ' in</span>');
    if (session.tokens_output) parts.push('<span>' + Number(session.tokens_output).toLocaleString() + ' out</span>');
    infoEl.innerHTML = parts.join('');
  } else {
    infoEl.innerHTML = '';
  }

  const msgEl = document.getElementById('messages');
  if (!msgs || msgs.length === 0) {
    msgEl.innerHTML = '<div class="empty-state"><p>No messages in this session yet.</p></div>';
    renderSessions(sessions);
    return;
  }

  msgEl.innerHTML = msgs.map(function(m) {
    var role = m.role || 'assistant';
    var type = m.part_type || 'text';
    var displayRole = type === 'tool' || type === 'tool-result' ? 'tool' : role;
    var isReasoning = type === 'reasoning';
    var cls = isReasoning ? 'reasoning' : displayRole;
    var time = m.msg_time ? formatTime(m.msg_time) : '';
    var content = renderContent(m.text || '(empty)');
    return '<div class="msg ' + cls + '">' +
      '<div class="avatar">' + getAvatar(displayRole) + '</div>' +
      '<div class="body">' +
        '<div class="label">' + getLabel(displayRole) + ' <span class="time">' + time + '</span></div>' +
        '<div class="content">' + content + '</div>' +
      '</div></div>';
  }).join('');

  renderSessions(sessions);
  msgEl.scrollTop = msgEl.scrollHeight;
}

function runMyAI() {
  window.open('opencode://', '_blank');
}

loadSessions();
</script>
</body>
</html>
